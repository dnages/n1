# azure-pipelines.yml
#
# Connect this repo from Azure DevOps:
#   Pipelines -> New pipeline -> GitHub -> select repo ->
#   Existing Azure Pipelines YAML file -> /pipelines/azure-pipelines.yml
#
# See README.md for full setup (variable groups, service connection, environment).

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: tfstate-backend
  - group: prime-counter-config
  - name: azureServiceConnection
    value: "azure-prime-counter-connection"
  - name: terraformWorkingDirectory
    value: "$(System.DefaultWorkingDirectory)/terraform"
  - name: terraformVersion
    value: "1.7.5"
  - name: pythonVersion
    value: "3.11"

stages:
  # -------------------------------------------------------------------------
  - stage: Test
    displayName: "Unit Tests"
    jobs:
      - job: PytestJob
        displayName: "Run pytest"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: pip install -r requirements.txt
            displayName: "Install test dependencies"

          - script: pytest tests/ -v --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml
            displayName: "Run unit tests"

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "$(Build.ArtifactStagingDirectory)/test-results.xml"
              testRunTitle: "Prime Counter Tests"

  # -------------------------------------------------------------------------
  - stage: Benchmark
    displayName: "Benchmark"
    dependsOn: Test
    jobs:
      - job: BenchmarkJob
        displayName: "Compare naive vs optimized"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: pip install -r requirements.txt
            displayName: "Install dependencies"

          - script: |
              python benchmark.py \
                --sizes 1000 5000 10000 \
                --repeats 3 \
                --profile-n 5000 \
                --json-out $(Build.ArtifactStagingDirectory)/benchmark-results.json \
                | tee $(Build.ArtifactStagingDirectory)/benchmark-output.txt
            displayName: "Run benchmark.py"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "benchmark-results"
              publishLocation: "Container"

  # -------------------------------------------------------------------------
  - stage: ValidateAndPlan
    displayName: "Terraform Validate & Plan"
    dependsOn: Benchmark
    jobs:
      - job: PlanJob
        displayName: "terraform init / validate / plan"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: "terraform init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: $(terraformWorkingDirectory)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(backend_resource_group)
              backendAzureRmStorageAccountName: $(backend_storage_account)
              backendAzureRmContainerName: $(backend_container)
              backendAzureRmKey: $(backend_key)

          - task: TerraformTaskV4@4
            displayName: "terraform validate"
            inputs:
              provider: "azurerm"
              command: "validate"
              workingDirectory: $(terraformWorkingDirectory)

          - task: TerraformTaskV4@4
            displayName: "terraform plan"
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: $(terraformWorkingDirectory)
              environmentServiceNameAzureRM: $(azureServiceConnection)
              commandOptions: >
                -var="resource_group_name=$(app_resource_group)"
                -var="storage_account_name=$(benchmark_storage_account)"
                -out=tfplan

  # -------------------------------------------------------------------------
  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: ValidateAndPlan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: ApplyJob
        displayName: "terraform apply"
        pool:
          vmImage: "ubuntu-latest"
        environment: "prime-counter-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  displayName: "Install Terraform"
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: TerraformTaskV4@4
                  displayName: "terraform init"
                  inputs:
                    provider: "azurerm"
                    command: "init"
                    workingDirectory: $(terraformWorkingDirectory)
                    backendServiceArm: $(azureServiceConnection)
                    backendAzureRmResourceGroupName: $(backend_resource_group)
                    backendAzureRmStorageAccountName: $(backend_storage_account)
                    backendAzureRmContainerName: $(backend_container)
                    backendAzureRmKey: $(backend_key)

                - task: TerraformTaskV4@4
                  displayName: "terraform apply"
                  inputs:
                    provider: "azurerm"
                    command: "apply"
                    workingDirectory: $(terraformWorkingDirectory)
                    environmentServiceNameAzureRM: $(azureServiceConnection)
                    commandOptions: >
                      -var="resource_group_name=$(app_resource_group)"
                      -var="storage_account_name=$(benchmark_storage_account)"
                      -auto-approve

                - task: DownloadBuildArtifacts@1
                  displayName: "Download benchmark artifact"
                  inputs:
                    buildType: "current"
                    downloadType: "single"
                    artifactName: "benchmark-results"
                    downloadPath: "$(Pipeline.Workspace)"

                - task: AzureCLI@2
                  displayName: "Upload benchmark JSON to blob storage"
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      STORAGE="$(benchmark_storage_account)"
                      CONTAINER="benchmark-results"
                      FILE="$(Pipeline.Workspace)/benchmark-results/benchmark-results.json"
                      BLOB="benchmark-$(Build.BuildId).json"

                      if [ -f "$FILE" ]; then
                        az storage blob upload \
                          --account-name "$STORAGE" \
                          --container-name "$CONTAINER" \
                          --name "$BLOB" \
                          --file "$FILE" \
                          --auth-mode login \
                          --overwrite
                        echo "Uploaded blob: $CONTAINER/$BLOB in storage account $STORAGE"
                      else
                        echo "Benchmark JSON not found at $FILE; skipping upload."
                      fi
